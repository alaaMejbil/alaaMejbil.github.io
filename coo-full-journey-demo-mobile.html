<title>DEWA Agentic Knowledge OS — All Roles, One Journey (Mobile)</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<style>
  :root {
    --bg: #f5f4fc; --surface: #ffffff; --surface-soft: #f0eefb; --border: #e4e1f2;
    --border-strong: #cbc5e8; --text: #1f1d33; --text-2: #5a5678; --text-3: #8f8bab;
    --accent: #7c3aed; --accent-2: #22d3ee; --accent-soft: #ede9fd; --accent-strong: #6d28d9;
    --good: #0e8a6a; --good-soft: #e0f5ec; --warn: #b45309; --warn-soft: #fdf1e0;
    --bad: #cf3550; --bad-soft: #fdeaee;
    --shadow: 0 10px 28px rgba(70, 45, 160, 0.14); --shadow-lg: 0 20px 50px rgba(70, 45, 160, 0.22);
    --glow: 0 0 22px rgba(124, 58, 237, 0.35); --r: 18px;
    --topbar-h: 50px; --banner-h: 20px; --bottombar-h: 66px;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14121e; --surface: #1e1b2d; --surface-soft: #252138; --border: #37324c;
      --border-strong: #4b4468; --text: #edeaf7; --text-2: #b4aecf; --text-3: #837da1;
      --accent: #a78bfa; --accent-soft: #322a4d; --accent-strong: #c4b0fc;
      --good: #3ecfa3; --good-soft: #1d3a32; --warn: #e8a04c; --warn-soft: #3c2e1a;
      --bad: #f47c92; --bad-soft: #43222b;
      --shadow: 0 10px 28px rgba(0,0,0,0.4); --shadow-lg: 0 20px 50px rgba(0,0,0,0.55); }
  }
  :root[data-theme="light"] { --bg: #f5f4fc; --surface: #ffffff; --surface-soft: #f0eefb; --border: #e4e1f2;
    --border-strong: #cbc5e8; --text: #1f1d33; --text-2: #5a5678; --text-3: #8f8bab;
    --accent: #7c3aed; --accent-soft: #ede9fd; --accent-strong: #6d28d9;
    --good: #0e8a6a; --good-soft: #e0f5ec; --warn: #b45309; --warn-soft: #fdf1e0;
    --bad: #cf3550; --bad-soft: #fdeaee; }
  :root[data-theme="dark"] { --bg: #14121e; --surface: #1e1b2d; --surface-soft: #252138; --border: #37324c;
    --border-strong: #4b4468; --text: #edeaf7; --text-2: #b4aecf; --text-3: #837da1;
    --accent: #a78bfa; --accent-soft: #322a4d; --accent-strong: #c4b0fc;
    --good: #3ecfa3; --good-soft: #1d3a32; --warn: #e8a04c; --warn-soft: #3c2e1a;
    --bad: #f47c92; --bad-soft: #43222b; }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; position: fixed; inset: 0; width: 100%;
  }
  button { font: inherit; cursor: pointer; -webkit-user-select: none; user-select: none; }
  .mono { font-variant-numeric: tabular-nums; }

  /* ============================================================ APP SHELL */
  .app { position: fixed; inset: 0; display: flex; flex-direction: column; height: 100dvh; }

  .banner {
    flex: 0 0 auto; height: var(--banner-h); display: flex; align-items: center; justify-content: center;
    gap: 6px; font-size: 9.5px; letter-spacing: 0.05em; font-weight: 800; text-transform: uppercase;
    background: var(--accent-soft); color: var(--accent-strong); padding-top: env(safe-area-inset-top);
    height: calc(var(--banner-h) + env(safe-area-inset-top));
  }
  .banner .bpulse { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .topbar {
    flex: 0 0 auto; height: var(--topbar-h); display: flex; align-items: center; gap: 8px;
    padding: 0 8px; background: var(--surface); border-bottom: 1px solid var(--border);
    position: relative; z-index: 20;
  }
  .iconbtn {
    width: 36px; height: 36px; border-radius: 50%; border: 0; background: transparent;
    color: var(--text-2); font-size: 20px; display: grid; place-items: center; flex: 0 0 auto;
    transition: transform 0.12s ease, background 0.12s ease;
  }
  .iconbtn:active { transform: scale(0.88); background: var(--surface-soft); }
  .iconbtn.hidden { visibility: hidden; }
  .dots { flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 0; }
  .dot {
    width: 6px; height: 6px; border-radius: 99px; background: var(--border-strong); border: 0; padding: 0;
    transition: width 0.28s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.28s ease; flex: 0 0 auto;
  }
  .dot.done { background: var(--good); }
  .dot.current { width: 20px; background: linear-gradient(90deg, var(--accent), #a855f7); box-shadow: var(--glow); }
  .speedbtn {
    flex: 0 0 auto; border: 1.5px solid var(--border-strong); background: var(--surface); color: var(--text-2);
    border-radius: 99px; padding: 5px 11px; font-size: 11.5px; font-weight: 800; transition: transform 0.12s ease;
  }
  .speedbtn:active { transform: scale(0.92); }
  .speedbtn.hot { border-color: var(--accent); color: var(--accent-strong); background: var(--accent-soft); }

  .viewport { flex: 1; min-height: 0; position: relative; overflow: hidden; background: var(--bg); }
  .track { position: absolute; inset: 0; }
  .panel {
    position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
    will-change: transform, opacity;
  }
  .panel.slide-in-r { animation: slideInR 0.32s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .panel.slide-in-l { animation: slideInL 0.32s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  @keyframes slideInR { from { transform: translateX(38px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInL { from { transform: translateX(-38px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .panel.slide-in-r, .panel.slide-in-l { animation: none; }
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  .bottombar {
    flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
    padding: 9px 14px calc(9px + env(safe-area-inset-bottom));
    background: var(--surface); border-top: 1px solid var(--border);
    min-height: var(--bottombar-h); position: relative; z-index: 20;
  }
  .stagelabel { font-size: 10.5px; font-weight: 750; color: var(--text-3); flex: 0 0 64px; line-height: 1.3; }
  .cta {
    flex: 1; border: 0; border-radius: 13px; padding: 13px 16px;
    background: linear-gradient(135deg, var(--accent), #a855f7); color: #fff; font-weight: 800; font-size: 14.5px;
    box-shadow: 0 6px 18px rgba(124, 58, 237, 0.35); transition: transform 0.12s ease, opacity 0.2s ease;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .cta:active { transform: scale(0.97); }
  .cta:disabled { background: var(--surface-soft); color: var(--text-3); box-shadow: none; }
  .cta.bounce { animation: bounceCta 0.5s ease; }
  @keyframes bounceCta { 0%, 100% { transform: scale(1); } 40% { transform: scale(1.05); } 65% { transform: scale(0.98); } }
  .cta.good { background: linear-gradient(135deg, var(--good), #14b8a6); box-shadow: 0 6px 18px rgba(14, 138, 106, 0.35); }

  /* ============================================================ CONTENT PRIMITIVES */
  .eyebrow {
    display: inline-block; font-size: 10.5px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--accent-strong); margin: 0 0 6px;
  }
  h1.pagehead { margin: 0 0 8px; font-size: 21px; line-height: 1.22; letter-spacing: -0.01em; }
  .lede { margin: 0 0 16px; color: var(--text-2); font-size: 14px; line-height: 1.48; }
  .who-chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px 3px 3px; border-radius: 99px;
    background: var(--surface-soft); border: 1px solid var(--border); font-size: 11.5px; font-weight: 750;
    color: var(--text-2); margin-bottom: 10px;
  }
  .who-chip svg { width: 22px; height: 24px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 14px 15px;
    margin-bottom: 11px; box-shadow: var(--shadow); animation: cardIn 0.35s ease both; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(8px); } }
  .card h4 { margin: 0 0 6px; font-size: 13px; }
  .card p { margin: 0; font-size: 13px; color: var(--text-2); line-height: 1.48; }
  .ai-pill { display: inline-block; font-size: 10.5px; font-weight: 800; padding: 2px 9px; border-radius: 99px;
    background: var(--accent-soft); color: var(--accent-strong); margin-bottom: 6px; }

  .btn { border: 0; border-radius: 11px; padding: 10px 15px; font-weight: 750; font-size: 13px;
    background: var(--surface-soft); color: var(--text-2); border: 1.5px solid var(--border-strong);
    transition: transform 0.12s ease; }
  .btn:active { transform: scale(0.95); }
  .btn.mini { padding: 7px 12px; font-size: 12px; }
  .btnrow { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 2px; }

  /* collapsible explainer */
  .disclose { border: 1.5px dashed var(--border-strong); border-radius: 14px; margin-bottom: 12px; overflow: hidden; background: var(--surface-soft); }
  .disclose > summary { list-style: none; display: flex; align-items: center; gap: 9px; padding: 11px 13px; font-size: 12.5px; font-weight: 800; color: var(--accent-strong); }
  .disclose > summary::-webkit-details-marker { display: none; }
  .disclose > summary .qi { width: 20px; height: 20px; border-radius: 50%; background: var(--accent-soft); display: grid; place-items: center; font-size: 11px; flex: 0 0 auto; }
  .disclose > summary .chev { margin-inline-start: auto; transition: transform 0.2s ease; color: var(--text-3); }
  .disclose[open] > summary .chev { transform: rotate(180deg); }
  .disclose .disclose-body { padding: 0 13px 13px 42px; font-size: 12.5px; color: var(--text-2); line-height: 1.5; animation: cardIn 0.25s ease both; }
  .disclose .disclose-body b { color: var(--text); }

  /* domain */
  .domhero {
    position: relative; border-radius: 16px; padding: 16px; margin-bottom: 10px; text-align: start; width: 100%;
    background: var(--surface-soft); border: 1.5px solid var(--accent); box-shadow: var(--glow);
    animation: breathe 2.4s infinite;
  }
  @keyframes breathe { 50% { box-shadow: 0 0 38px rgba(124, 58, 237, 0.5); } }
  .domhero.picked { animation: none; border-color: var(--good); box-shadow: 0 0 26px rgba(14, 138, 106, 0.3); }
  .domhero .dtag { position: absolute; top: -9px; inset-inline-end: 12px; font-size: 9.5px; font-weight: 900; letter-spacing: 0.06em;
    background: var(--accent-soft); color: var(--accent-strong); border: 1px solid var(--border-strong); border-radius: 99px; padding: 2px 8px; }
  .domhero.picked .dtag { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .domhero b { font-size: 16px; color: var(--text); display: block; }
  .domhero small { color: var(--text-3); font-size: 11.5px; }
  .domhero.picked::after { content: '✓'; position: absolute; inset-inline-end: 14px; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px; border-radius: 50%; background: var(--good); color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 900; }

  /* roster story-bar */
  .roster { display: flex; gap: 6px; overflow-x: auto; padding: 2px 2px 8px; -webkit-overflow-scrolling: touch; }
  .roster::-webkit-scrollbar { display: none; }
  .rchip { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px; width: 46px;
    transition: transform 0.25s ease; }
  .rchip svg { width: 32px; height: 35px; filter: grayscale(0.5) opacity(0.6); transition: filter 0.25s ease, transform 0.25s ease; }
  .rchip span { font-size: 7.5px; font-weight: 750; color: var(--text-3); text-align: center; line-height: 1.15; }
  .rchip.on svg { filter: none; transform: scale(1.18); }
  .rchip.on span { color: var(--accent-strong); font-weight: 800; }

  /* spotlight */
  .spot { display: flex; gap: 12px; align-items: center; border-radius: 16px; padding: 14px; margin-bottom: 10px;
    background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-lg); min-height: 92px; }
  .spot-av { position: relative; width: 54px; height: 59px; flex: 0 0 auto; }
  .spot-av svg { width: 100%; display: block; position: relative; z-index: 2; }
  .spot-av::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; background: var(--accent);
    opacity: 0; transform: scale(0.6); z-index: 1; }
  .spot.talk .spot-av::before { animation: ring 1.1s ease-out infinite; }
  @keyframes ring { 0% { opacity: 0.35; transform: scale(0.7); } 100% { opacity: 0; transform: scale(1.5); } }
  .spot.talk .spot-av svg { filter: drop-shadow(0 0 10px rgba(124, 58, 237, 0.5)); }
  .spot-role { font-size: 9.5px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-3); }
  .spot-name { font-size: 14px; font-weight: 800; color: var(--accent-strong); margin: 1px 0 3px; }
  .spot-text { font-size: 13px; color: var(--text); line-height: 1.42; }

  .ordbanner { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--warn-soft);
    color: var(--warn); font-weight: 900; letter-spacing: 0.06em; border-radius: 12px; font-size: 12.5px;
    max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease; }
  .ordbanner.show { max-height: 50px; opacity: 1; padding: 9px; margin-bottom: 10px; }

  .hbar { display: flex; gap: 8px; margin-bottom: 10px; }
  .hstat { flex: 1; background: var(--surface-soft); border: 1px solid var(--border); border-radius: 12px;
    padding: 8px 6px; text-align: center; }
  .hstat b { display: block; font-size: 15px; color: var(--accent-strong); }
  .hstat b.flip { animation: flip 0.4s ease; }
  @keyframes flip { 0% { transform: translateY(-6px); opacity: 0; } 100% { transform: none; opacity: 1; } }
  .hstat span { font-size: 8.5px; color: var(--text-3); font-weight: 750; letter-spacing: 0.03em; text-transform: uppercase; }
  .confbar { margin: 2px 0 10px; }
  .confbar .cb { height: 7px; border-radius: 99px; background: var(--surface-soft); border: 1px solid var(--border); overflow: hidden; }
  .confbar .cb i { display: block; height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .confbar .cl { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-3); margin-top: 3px; }

  .feed { border: 1px solid var(--border); border-radius: 14px; background: var(--surface-soft);
    padding: 10px 11px; max-height: 34vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .feed .line { display: grid; grid-template-columns: 24px 1fr; gap: 8px; padding: 6px 2px;
    border-bottom: 1px dashed var(--border); animation: cardIn 0.25s ease both; font-size: 12px; }
  .feed .line:last-child { border-bottom: 0; }
  .feed .fav svg { width: 100%; }
  .feed .who { font-weight: 750; font-size: 11px; }
  .feed .txt { color: var(--text-2); }
  .typing i { display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: var(--text-3);
    margin-inline-end: 3px; animation: blink 1s infinite; }
  .typing i:nth-child(2) { animation-delay: 0.2s; } .typing i:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 50% { opacity: 0.2; } }

  /* stakeholder rows */
  .strow { display: flex; align-items: center; gap: 10px; padding: 9px 4px; border-bottom: 1px dashed var(--border); }
  .strow:last-child { border-bottom: 0; }
  .strow svg { width: 32px; height: 35px; flex: 0 0 auto; }
  .strow b { font-size: 13px; display: block; } .strow small { color: var(--text-3); font-size: 11px; }
  .strow .toggle { margin-inline-start: auto; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-strong);
    display: grid; place-items: center; font-size: 11px; color: transparent; background: var(--surface); flex: 0 0 auto; transition: all 0.15s ease; }
  .strow .toggle.on { background: var(--good); border-color: var(--good); color: #fff; }

  /* chat */
  .chat { border: 1px solid var(--border); border-radius: 15px; background: var(--surface-soft); overflow: hidden;
    display: flex; flex-direction: column; max-height: 44vh; margin-bottom: 10px; }
  .chat-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 750; }
  .chat-head svg { width: 24px; height: 26px; }
  .chat-head .live { margin-inline-start: auto; font-size: 9.5px; color: var(--bad); font-weight: 800; display: flex; align-items: center; gap: 4px; }
  .chat-head .live i { width: 6px; height: 6px; border-radius: 50%; background: var(--bad); animation: pulse 1.4s infinite; }
  .msgs { flex: 1; overflow-y: auto; padding: 11px; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }
  .mrow { display: flex; gap: 7px; align-items: flex-end; max-width: 90%; animation: cardIn 0.25s ease both; }
  .mrow.right { align-self: flex-end; flex-direction: row-reverse; }
  .mrow .mav { width: 24px; height: 26px; flex: none; }
  .bubble { padding: 8px 11px; border-radius: 13px; font-size: 12.5px; }
  .mrow:not(.right) .bubble { background: var(--accent-soft); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .mrow.right .bubble { background: var(--surface); border: 1px solid var(--border-strong); border-bottom-right-radius: 3px; color: var(--text-2); }
  .bubble .tag { display: block; font-size: 9.5px; font-weight: 800; margin-bottom: 2px; color: var(--accent-strong); }
  .sysline { align-self: center; font-size: 10.5px; font-weight: 700; color: var(--accent-strong); background: var(--surface);
    border: 1.5px dashed var(--border-strong); padding: 4px 11px; border-radius: 99px; text-align: center; animation: cardIn 0.25s ease both; }
  .sysline.warn { color: var(--warn); border-color: var(--warn); } .sysline.bad { color: var(--bad); border-color: var(--bad); }
  .chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .spill { font-size: 10px; font-weight: 800; border-radius: 99px; padding: 3px 9px; letter-spacing: 0.02em; }
  .spill.ok { background: var(--good-soft); color: var(--good); } .spill.warn { background: var(--warn-soft); color: var(--warn); }
  .spill.bad { background: var(--bad-soft); color: var(--bad); } .spill.grey { background: var(--surface-soft); color: var(--text-3); border: 1px solid var(--border); }
  .ticker { font-size: 11.5px; color: var(--text-2); font-weight: 700; margin-bottom: 8px; }

  /* governance verdict + gates */
  .verdict { display: flex; gap: 10px; align-items: center; padding: 12px 13px; border-radius: 13px;
    background: var(--warn-soft); border: 1px solid var(--border); margin-bottom: 11px; }
  .verdict .vicon { width: 34px; height: 34px; border-radius: 50%; background: var(--warn); color: #fff;
    display: grid; place-items: center; font-weight: 900; font-size: 15px; flex: 0 0 auto; }
  .verdict b { font-size: 13px; display: block; } .verdict p { margin: 2px 0 0; font-size: 11.5px; color: var(--text-2); }
  .gaterow { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 4px; }
  .gate { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; background: var(--surface-soft); border: 1px solid var(--border);
    border-radius: 99px; padding: 6px 11px 6px 6px; font-size: 11px; font-weight: 700; color: var(--text-2); white-space: nowrap; }
  .gate .gi { width: 17px; height: 17px; border-radius: 50%; display: grid; place-items: center; font-size: 9.5px; color: #fff; flex: 0 0 auto; }

  .logline { display: flex; gap: 9px; padding: 7px 2px; border-bottom: 1px dashed var(--border); font-size: 11.5px; animation: cardIn 0.25s ease both; }
  .logline .lt { color: var(--text-3); font-family: ui-monospace, Menlo, monospace; font-size: 10px; flex: 0 0 42px; }
  .logline .la { flex: 0 0 56px; font-weight: 800; font-size: 10.5px; } .logline .ld { color: var(--text-2); flex: 1; }

  /* file list */
  .flist { border: 1px solid var(--border); border-radius: 14px; background: var(--surface); overflow: hidden; }
  .fitem { display: flex; align-items: center; gap: 10px; width: 100%; text-align: start; border: 0;
    border-bottom: 1px solid var(--border); background: transparent; padding: 12px 13px; transition: background 0.12s ease; }
  .fitem:last-child { border-bottom: 0; }
  .fitem:active { background: var(--surface-soft); }
  .fitem .fic { width: 30px; height: 30px; border-radius: 8px; background: var(--surface-soft); display: grid; place-items: center; font-size: 14px; flex: 0 0 auto; }
  .fitem .fnm { flex: 1; min-width: 0; font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .fitem .fdot { width: 7px; height: 7px; border-radius: 50%; background: var(--warn); flex: 0 0 auto; }
  .fitem.seen .fdot { background: var(--good); }
  .fitem .chev2 { color: var(--text-3); font-size: 15px; flex: 0 0 auto; }
  .filestat { display: flex; gap: 8px; margin: 12px 0 4px; }
  .filestat .fs { flex: 1; background: var(--surface-soft); border: 1px solid var(--border); border-radius: 12px; padding: 8px; text-align: center; }
  .filestat .fs b { display: block; font-size: 16px; color: var(--accent-strong); } .filestat .fs span { font-size: 8px; color: var(--text-3); font-weight: 750; text-transform: uppercase; }

  /* bottom sheet */
  .sheet-backdrop { position: fixed; inset: 0; background: rgba(10, 6, 26, 0.45); opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease; z-index: 40; }
  .sheet-backdrop.show { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; max-height: 86vh; background: var(--surface);
    border-radius: 20px 20px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.16, 1, 0.3, 1); z-index: 41; display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom); }
  .sheet.show { transform: translateY(0); }
  .sheet-handle { width: 38px; height: 4px; border-radius: 99px; background: var(--border-strong); margin: 10px auto 4px; flex: 0 0 auto; }
  .sheet-head { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  .sheet-head .fic { width: 28px; height: 28px; border-radius: 8px; background: var(--accent-soft); display: grid; place-items: center; font-size: 13px; flex: 0 0 auto; }
  .sheet-head .pvn { flex: 1; min-width: 0; font-family: ui-monospace, Menlo, monospace; font-size: 12px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sheet-head .draft { font-size: 8.5px; font-weight: 900; letter-spacing: 0.08em; color: var(--warn); border: 1.5px solid var(--warn); border-radius: 5px; padding: 2px 6px; }
  .sheet-body { flex: 1; overflow-y: auto; padding: 14px 16px; font-family: ui-monospace, Menlo, monospace; font-size: 12px; line-height: 1.65; color: var(--text-2); white-space: pre-wrap; -webkit-overflow-scrolling: touch; }
  .sheet-foot { display: flex; gap: 8px; padding: 10px 16px calc(12px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); flex: 0 0 auto; }
  .sheet-foot .btn { flex: 1; }

  /* final */
  .final { text-align: center; padding: 30px 8px 8px; }
  .final h1 { font-size: 21px; } .final p { color: var(--text-2); font-size: 13.5px; margin: 8px 0; }
  .botgrid { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 16px 0; }
  .botgrid .fbot { display: flex; flex-direction: column; align-items: center; width: 48px; animation: cardIn 0.4s ease both; }
  .botgrid svg { width: 34px; height: 37px; animation: floaty 3.4s ease-in-out infinite; }
  .botgrid .fbot:nth-child(2n) svg { animation-delay: 0.5s; } .botgrid .fbot:nth-child(3n) svg { animation-delay: 1s; }
  @keyframes floaty { 50% { transform: translateY(-6px); } }
  .botgrid .fname { font-size: 6.5px; font-weight: 800; color: var(--text-3); text-align: center; line-height: 1.15; margin-top: 2px; }
  .footnote { font-size: 11px; color: var(--text-3); margin-top: 14px; }
</style>

<div class="app" id="app">
  <div class="banner"><span class="bpulse"></span> Demo — dummy data · simulated AI</div>
  <div class="topbar">
    <button class="iconbtn" id="backBtn">‹</button>
    <div class="dots" id="dots"></div>
    <button class="speedbtn" id="speedBtn">1×</button>
  </div>
  <div class="viewport" id="viewport">
    <div class="track" id="track"></div>
  </div>
  <div class="bottombar">
    <div class="stagelabel" id="stagelabel">1 / 7</div>
    <button class="cta" id="ctaBtn">Continue →</button>
  </div>
</div>
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head" id="sheetHead"></div>
  <div class="sheet-body" id="sheetBody"></div>
  <div class="sheet-foot"><button class="btn" id="sheetOpen">Open in new tab ↗</button><button class="btn" id="sheetClose">Done</button></div>
</div>

<script>
(function () {
  'use strict';
  const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
  let uid = 0;

  function robot(c, cl, eyeC, variant) {
    const id = 'g' + (uid++);
    const headRx = variant === 1 ? 12 : 26;
    const ant = variant === 1
      ? `<line x1="34" y1="22" x2="30" y2="8" stroke="${c}" stroke-width="4" stroke-linecap="round"/><circle cx="30" cy="7" r="4.5" fill="${eyeC}"/>
         <line x1="66" y1="22" x2="70" y2="8" stroke="${c}" stroke-width="4" stroke-linecap="round"/><circle cx="70" cy="7" r="4.5" fill="${eyeC}"/>`
      : variant === 2
      ? `<rect x="44" y="6" width="12" height="7" rx="3" fill="${c}"/><ellipse cx="50" cy="6" rx="9" ry="3.5" fill="${eyeC}" opacity="0.9"/>`
      : `<line x1="50" y1="20" x2="50" y2="7" stroke="${c}" stroke-width="4" stroke-linecap="round"/><circle cx="50" cy="6" r="5" fill="${eyeC}"><animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/></circle>`;
    const eyes = variant === 2
      ? `<rect x="34" y="46" width="32" height="7" rx="3.5" fill="${eyeC}"><animate attributeName="x" values="34;40;34;30;34" dur="3.4s" repeatCount="indefinite"/><animate attributeName="width" values="32;20;32;22;32" dur="3.4s" repeatCount="indefinite"/></rect>`
      : `<circle cx="40" cy="49" r="5.6" fill="${eyeC}"><animate attributeName="r" values="5.6;5.6;1.4;5.6" keyTimes="0;0.9;0.95;1" dur="4.6s" repeatCount="indefinite"/></circle>
         <circle cx="60" cy="49" r="5.6" fill="${eyeC}"><animate attributeName="r" values="5.6;5.6;1.4;5.6" keyTimes="0;0.9;0.95;1" dur="4.6s" repeatCount="indefinite"/></circle>
         <circle cx="42" cy="47" r="1.7" fill="#fff" opacity="0.95"/><circle cx="62" cy="47" r="1.7" fill="#fff" opacity="0.95"/>`;
    return `<svg viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <radialGradient id="${id}" cx="34%" cy="26%" r="90%"><stop offset="0%" stop-color="${cl}"/><stop offset="100%" stop-color="${c}"/></radialGradient>
        <linearGradient id="${id}v" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f1730"/><stop offset="100%" stop-color="#1d2a52"/></linearGradient>
      </defs>
      ${ant}
      <rect x="12" y="34" width="8" height="22" rx="4" fill="${c}" opacity="0.85"/>
      <rect x="80" y="34" width="8" height="22" rx="4" fill="${c}" opacity="0.85"/>
      <rect x="17" y="20" width="66" height="56" rx="${headRx}" fill="url(#${id})" stroke="rgba(20,10,60,0.18)" stroke-width="1.5"/>
      <ellipse cx="36" cy="30" rx="16" ry="7" fill="#fff" opacity="0.30"/>
      <rect x="27" y="40" width="46" height="20" rx="10" fill="url(#${id}v)"/>
      ${eyes}
      <rect x="40" y="66" width="20" height="4" rx="2" fill="rgba(15,23,48,0.5)"/>
      <rect x="42" y="78" width="16" height="9" rx="3" fill="${c}"/>
      <rect x="26" y="86" width="48" height="20" rx="10" fill="url(#${id})" stroke="rgba(20,10,60,0.15)" stroke-width="1.5"/>
      <circle cx="50" cy="95" r="4.5" fill="${eyeC}" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.8s" repeatCount="indefinite"/></circle>
    </svg>`;
  }
  function person(skin, shirt, hair, style) {
    const id = 'p' + (uid++);
    const hairShape = style === 1
      ? `<path d="M28 40 q0 -22 22 -22 q22 0 22 22 l0 14 q-4 -12 -10 -14 q-14 6 -28 2 q-4 4 -6 12 z" fill="${hair}"/>`
      : style === 2
      ? `<path d="M27 42 q-2 -26 23 -26 q25 0 23 26 l-1 22 q-3 2 -6 2 l1 -18 q-16 8 -34 0 l1 18 q-3 0 -6 -2 z" fill="${hair}"/>`
      : `<path d="M29 40 q1 -20 21 -20 q20 0 21 20 q-8 -8 -21 -8 q-13 0 -21 8 z" fill="${hair}"/>`;
    return `<svg viewBox="0 0 100 112" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs><radialGradient id="${id}" cx="38%" cy="30%" r="85%"><stop offset="0%" stop-color="#fff" stop-opacity="0.45"/><stop offset="100%" stop-color="${shirt}"/></radialGradient></defs>
      <circle cx="50" cy="46" r="21" fill="${skin}"/>
      ${hairShape}
      <circle cx="43" cy="48" r="2" fill="#2b2438"/><circle cx="57" cy="48" r="2" fill="#2b2438"/>
      <path d="M45 56 q5 4 10 0" stroke="#2b2438" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M22 108 q2 -26 28 -26 q26 0 28 26 z" fill="url(#${id})"/>
      <path d="M43 84 l7 8 l7 -8" fill="#fff" opacity="0.85"/>
    </svg>`;
  }

  const AGENTS = [
    { n: 'Domain Research',      w: 1, c: '#7c3aed', cl: '#c4b0fc', e: '#7df9ff', v: 0 },
    { n: 'ITIL Best Practice',   w: 1, c: '#0284c7', cl: '#7dd3fc', e: '#e0f2fe', v: 1 },
    { n: 'DEWA Context',         w: 1, c: '#059669', cl: '#6ee7b7', e: '#d1fae5', v: 0 },
    { n: 'Systems Hypothesis',   w: 1, c: '#d97706', cl: '#fcd34d', e: '#7df9ff', v: 1 },
    { n: 'Stakeholder Mapping',  w: 1, c: '#0891b2', cl: '#67e8f9', e: '#ecfeff', v: 0 },
    { n: 'Scenario Builder',     w: 1, c: '#c026d3', cl: '#f0abfc', e: '#7df9ff', v: 1 },
    { n: 'Risk Thinker',         w: 1, c: '#e11d48', cl: '#fda4af', e: '#ffd166', v: 0 },
    { n: 'Enterprise Architect', w: 1, c: '#7e22ce', cl: '#d8b4fe', e: '#fef08a', v: 1 },
    { n: 'Harness Engineer',     w: 1, c: '#ea580c', cl: '#fdba74', e: '#7df9ff', v: 0 },
    { n: 'Governance',           w: 1, c: '#65a30d', cl: '#bef264', e: '#f7fee7', v: 1 },
    { n: 'Verifier',             w: 2, c: '#dc2626', cl: '#fca5a5', e: '#fee2e2', v: 2 },
    { n: 'Loop Engineer',        w: 2, c: '#475569', cl: '#cbd5e1', e: '#7df9ff', v: 1 },
    { n: 'Executive Synthesis',  w: 3, c: '#ca8a04', cl: '#fde047', e: '#fefce8', v: 2 },
  ];
  AGENTS.forEach((a) => { a.svg = robot(a.c, a.cl, a.e, a.v); });
  const INTERVIEWER = robot('#0e7490', '#67e8f9', '#ecfeff', 0);
  const ANSWER_AI = robot('#6d28d9', '#d8b4fe', '#fef08a', 2);
  const GOV_AI = robot('#65a30d', '#bef264', '#f7fee7', 1);

  const HUMANS = [
    { n: 'Khalid',  r: 'CAB Chair',        svg: person('#e8b48c', '#334155', '#26202c', 0) },
    { n: 'Fatima',  r: 'NOC Shift Lead',   svg: person('#d9a074', '#0e7490', '#1a1620', 2) },
    { n: 'Omar',    r: 'SO · Billing',     svg: person('#c98a5e', '#7c3aed', '#211a26', 0) },
    { n: 'Layla',   r: 'SO · Network',     svg: person('#eec098', '#be185d', '#33202a', 2) },
    { n: 'Yusuf',   r: 'BMC Admin',        svg: person('#d69f78', '#374151', '#141019', 1) },
    { n: 'Mariam',  r: 'Checklist Keeper', svg: person('#e3ac82', '#059669', '#241c28', 2) },
  ];
  const DANA  = person('#e2aa80', '#6d28d9', '#2b2130', 2);
  const NOURA = person('#deb08a', '#b45309', '#1d1826', 1);
  const SALEM = person('#c88f62', '#0f766e', '#181420', 0);

  /* ============ app state & shell wiring ============ */
  const STEPS = ['Domain', 'Chamber', 'Review', 'Meetings', 'Governance', 'Admin', 'Files'];
  let idx = 0, clicks = 0, SPEED = 1, timers = [];
  const track = document.getElementById('track');
  const dotsEl = document.getElementById('dots');
  const stagelabel = document.getElementById('stagelabel');
  const ctaBtn = document.getElementById('ctaBtn');
  const backBtn = document.getElementById('backBtn');
  const speedBtn = document.getElementById('speedBtn');

  function later(fn, ms) { const t = setTimeout(fn, ms / SPEED); timers.push(t); return t; }
  function cleanup() { timers.forEach(clearTimeout); timers = []; }
  function count() { clicks++; }

  function setCTA(label, enabled, handler, good) {
    ctaBtn.textContent = label;
    ctaBtn.disabled = !enabled;
    ctaBtn.classList.toggle('good', !!good);
    ctaBtn.onclick = handler || null;
  }
  function ctaReady(label, handler, good) {
    setCTA(label, true, handler, good);
    ctaBtn.classList.remove('bounce'); void ctaBtn.offsetWidth; ctaBtn.classList.add('bounce');
  }

  function drawDots() {
    dotsEl.innerHTML = STEPS.map((_, i) =>
      `<button class="dot ${i < idx ? 'done' : i === idx ? 'current' : ''}" data-i="${i}" aria-label="Stage ${i + 1}"></button>`
    ).join('');
    dotsEl.querySelectorAll('.dot').forEach((d) => { d.onclick = () => go(+d.dataset.i, +d.dataset.i > idx ? 1 : -1); });
    stagelabel.textContent = `${idx + 1} / ${STEPS.length}`;
    backBtn.classList.toggle('hidden', idx === 0);
  }

  function go(n, dir) {
    if (n === idx && dir === undefined) return;
    cleanup();
    closeSheet();
    dir = dir === undefined ? (n > idx ? 1 : -1) : dir;
    idx = n;
    const panel = document.createElement('div');
    panel.className = 'panel ' + (dir >= 0 ? 'slide-in-r' : 'slide-in-l');
    track.innerHTML = '';
    track.appendChild(panel);
    panel.scrollTop = 0;
    drawDots();
    STAGES[idx](panel);
  }
  backBtn.onclick = () => { if (idx > 0) go(idx - 1, -1); };
  speedBtn.onclick = () => {
    SPEED = SPEED === 1 ? 2 : SPEED === 2 ? 3 : 1;
    speedBtn.textContent = SPEED + '×';
    speedBtn.classList.toggle('hot', SPEED > 1);
  };

  /* swipe navigation */
  let tx0 = null, ty0 = null;
  const viewport = document.getElementById('viewport');
  viewport.addEventListener('touchstart', (e) => {
    const t = e.touches[0]; tx0 = t.clientX; ty0 = t.clientY;
  }, { passive: true });
  viewport.addEventListener('touchend', (e) => {
    if (tx0 === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - tx0, dy = t.clientY - ty0;
    tx0 = null;
    if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.4) {
      if (dx < 0 && idx < STEPS.length - 1) go(idx + 1, 1);
      else if (dx > 0 && idx > 0) go(idx - 1, -1);
    }
  }, { passive: true });

  /* ============ bottom sheet (file viewer) ============ */
  const sheet = document.getElementById('sheet');
  const sheetBackdrop = document.getElementById('sheetBackdrop');
  const sheetHead = document.getElementById('sheetHead');
  const sheetBody = document.getElementById('sheetBody');
  let sheetFile = null;
  function openSheet(f) {
    sheetFile = f;
    sheetHead.innerHTML = `<span class="fic">${f.icon}</span><span class="pvn">${f.name}</span><span class="draft">DRAFT</span>`;
    sheetBody.textContent = f.body;
    sheet.classList.add('show'); sheetBackdrop.classList.add('show');
  }
  function closeSheet() { sheet.classList.remove('show'); sheetBackdrop.classList.remove('show'); sheetFile = null; }
  document.getElementById('sheetClose').onclick = closeSheet;
  sheetBackdrop.onclick = closeSheet;
  document.getElementById('sheetOpen').onclick = (e) => {
    if (!sheetFile) return;
    count();
    const blob = new Blob([sheetFile.body], { type: sheetFile.kind + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    let w = null;
    try { w = window.open(url, '_blank'); } catch (err) { w = null; }
    const btn = e.currentTarget, original = btn.textContent;
    btn.textContent = w ? 'Opened ✓' : 'Blocked — see above ↑';
    later(() => { btn.textContent = original; }, 2200);
  };

  /* ============ shared render helpers ============ */
  function rosterHTML() {
    return `<div class="roster" id="roster">` + AGENTS.map((a, i) =>
      `<span class="rchip" id="rc${i}">${a.svg}<span>${a.n}</span></span>`).join('') + `</div>`;
  }
  function rosterMark(i) {
    AGENTS.forEach((_, k) => {
      const el = document.getElementById('rc' + k);
      if (el) el.classList.toggle('on', k === i);
    });
  }
  function playFeed(feedEl, lines, onDone, gap, onLine) {
    let i = 0;
    (function next() {
      if (i >= lines.length) { if (onDone) onDone(); return; }
      const L = lines[i++];
      const a = AGENTS[L.f];
      if (onLine) onLine(L);
      const row = document.createElement('div');
      row.className = 'line';
      row.innerHTML = `<span class="fav">${a.svg}</span><span><span class="who" style="color:${a.c}">${a.n}</span><br><span class="typing"><i></i><i></i><i></i></span></span>`;
      feedEl.appendChild(row); feedEl.scrollTop = feedEl.scrollHeight;
      later(() => {
        row.querySelector('.typing').outerHTML = `<span class="txt">${L.text}</span>`;
        feedEl.scrollTop = feedEl.scrollHeight;
        later(next, gap * 0.5);
      }, gap * 0.5);
    })();
  }
  function addMsg(msgsEl, side, who, tagColor, avSvg, text) {
    const row = document.createElement('div');
    row.className = 'mrow' + (side === 'right' ? ' right' : '');
    row.innerHTML = `<span class="mav">${avSvg}</span><span class="bubble"><span class="tag"${tagColor ? ` style="color:${tagColor}"` : ''}>${who}</span>${text}</span>`;
    msgsEl.appendChild(row); msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  function addSys(msgsEl, cls, text) {
    const el = document.createElement('div');
    el.className = 'sysline' + (cls ? ' ' + cls : '');
    el.textContent = text;
    msgsEl.appendChild(el); msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  /* ============ STAGES ============ */
  const STAGES = [];

  /* -------- 0: domain -------- */
  STAGES[0] = function (p) {
    p.innerHTML = `
      <p class="eyebrow">Step 1 · the Domain Owner starts it</p>
      <h1 class="pagehead">Dana picks one domain — and makes it agentic</h1>
      <p class="lede">The platform serves all of DEWA Digital Operations. Everything that follows starts from this single human choice.</p>
      <button class="domhero" id="dom-cm"><span class="dtag">PILOT · READY</span><b>Change Management</b><small>ITIL practice · Ramadan rollback story</small></button>
      <details class="disclose"><summary><span class="qi">i</span>7 more domains — locked to later phases<span class="chev">⌄</span></summary>
        <div class="disclose-body">Incident, Problem, Release (Phase 2) · Asset, Capacity, Service Requests, Knowledge Management (Phase 3). Change Management is the only pilot live today.</div></details>
      <div class="card"><h4>Why Change Management first?</h4><p>A change failed during Ramadan peak and the rollback checklist turned out to be an Excel file nobody owns. Dana wants the organization to finally know what it knows.</p></div>`;
    setCTA('Select a domain first', false);
    document.getElementById('dom-cm').onclick = () => {
      count();
      const d = document.getElementById('dom-cm');
      if (d.classList.contains('picked')) return;
      d.classList.add('picked');
      d.querySelector('.dtag').textContent = 'SELECTED ✓';
      ctaReady('Make it agentic — wake 13 specialists →', () => { count(); go(1, 1); });
    };
  };

  /* -------- 1: debate chamber (spotlight) -------- */
  STAGES[1] = function (p) {
    p.innerHTML = `
      <span class="who-chip">${DANA} Dana · Domain Owner (watching)</span>
      <p class="eyebrow">Step 2 · the debate chamber</p>
      <h1 class="pagehead">13 agents investigate. Nothing passes unverified.</h1>
      <p class="lede">The <b>Verifier</b> attacks weak claims; the <b>Loop Engineer</b> — the Speaker — won't advance the loop while a challenge is open.</p>
      ${rosterHTML()}
      <div class="ordbanner" id="ordbanner">⚡ ORDER, ORDER!</div>
      <div class="spot" id="spot">
        <span class="spot-av" id="spot-av">${AGENTS[11].svg}</span>
        <span><span class="spot-role" id="spot-role">Loop Engineer · Speaker</span><span class="spot-name" id="spot-name">Loop Engineer</span>
          <div class="spot-text" id="spot-text">Calling the House to order…</div></span>
      </div>
      <div class="hbar">
        <div class="hstat"><b id="hRound">1/3</b><span>Round</span></div>
        <div class="hstat"><b id="hChal">0</b><span>Challenges</span></div>
        <div class="hstat"><b id="hSrc">0</b><span>Sources</span></div>
      </div>
      <div class="confbar"><div class="cb"><i id="hConf"></i></div><div class="cl"><span>Confidence</span><span id="hConfV">—</span></div></div>
      <div class="feed" id="chamber-feed"></div>`;
    setCTA('Investigating…', false);

    const ROLE = { 10: 'Verifier · Front bench', 11: 'Loop Engineer · Speaker', 12: 'Executive Synthesis · Despatch box' };
    const H = {
      round: (r) => { const el = document.getElementById('hRound'); el.textContent = r + '/3'; el.classList.remove('flip'); void el.offsetWidth; el.classList.add('flip'); },
      chal: (n) => { const el = document.getElementById('hChal'); el.textContent = n; el.style.color = n > 0 ? 'var(--bad)' : 'var(--good)'; el.classList.remove('flip'); void el.offsetWidth; el.classList.add('flip'); },
      src: (n) => { document.getElementById('hSrc').textContent = n; },
      conf: (v) => { document.getElementById('hConf').style.width = v + '%'; document.getElementById('hConfV').textContent = v + (v === 75 ? ' · CAPPED 🔒' : ''); },
    };
    function speak(agentIdx, text, holdMs) {
      const a = AGENTS[agentIdx];
      const spot = document.getElementById('spot');
      rosterMark(agentIdx);
      document.getElementById('spot-av').innerHTML = a.svg;
      document.getElementById('spot-name').textContent = a.n;
      document.getElementById('spot-role').textContent = ROLE[agentIdx] || `Backbencher · Wave ${a.w}`;
      document.getElementById('spot-text').textContent = text;
      spot.classList.add('talk');
      later(() => spot.classList.remove('talk'), holdMs);
    }
    function order() {
      const o = document.getElementById('ordbanner'); o.classList.add('show');
      later(() => o.classList.remove('show'), 1900);
    }

    const HOLD = 2600;
    const LINES = [
      { f: 11, text: 'The House is in session on mandate DM-0417. Round 1 — investigate. I enforce the stop conditions: nothing leaves this chamber unsourced, unchallenged, or self-approved.',
        act: () => { H.round(1); speak(11, 'The House is in session. Round 1 — investigate.', HOLD); } },
      { f: 0, text: 'The change lifecycle is mapped end-to-end: request → assess → CAB → implement → review. And for the record — the owner claims the CAB reviews one hundred percent of normal changes.',
        act: () => { H.src(3); speak(0, 'Lifecycle mapped. Owner claims CAB reviews 100%.', HOLD); } },
      { f: 1, text: 'Seven ITIL controls govern this practice — CAB, freeze windows, post-implementation review. On paper, textbook. At 02:00, untested.',

      { f: 2, text: 'In DEWA Digital Operations, NOC and DCC night-shift reality rarely matches the written policy. The House should expect a gap between the two.',

      { f: 11, text: 'ORDER, ORDER! Challenge sustained. The claim is downgraded to assumption. The loop does not advance with open challenges — Round 2, re-investigate.',
        act: () => { order(); H.round(2); later(() => speak(11, 'ORDER! Challenge sustained → ROUND 2.', HOLD), 380); } },
      { f: 4, text: 'Round 2 return: six knowledge holders mapped — Khalid, Fatima, Omar, Layla, Yusuf, Mariam. The CAB claim is remanded to Khalid’s interview. Mariam is the priority witness.',

      { f: 9, text: 'No approve verb exists anywhere in this platform. Restricted actions are enumerated, and every act — including refusals — is written to the audit trail.',

      { f: 10, text: 'Re-examination complete. Fourteen sources across nine claims; one assumption remains, properly labeled as such. No objection stands.',

      { f: 11, text: 'Stop conditions met: claims sourced or downgraded, zero open challenges. Round 3 — synthesize. The chair yields to the despatch box.',
        act: () => { H.round(3); speak(11, 'Stop conditions met → ROUND 3. Synthesize.', HOLD); } },
      { f: 12, text: 'One page. Three risky assumptions, clearly marked. Twenty-eight questions for six witnesses. Confidence: seventy-five — capped by construction until a human validates it.',
        act: () => { H.conf(75); speak(12, 'One page. Confidence 75 — capped by law.', HOLD); } },
      { f: 11, text: 'The House rises. The study is delivered as a DRAFT to the Domain Owner. Nothing spoken here is truth yet — that power belongs to humans.',
        act: () => speak(11, 'The House rises. Delivered as DRAFT to Dana.', HOLD) },
    ];
    playFeed(document.getElementById('chamber-feed'), LINES, () => {
      ctaReady('The study is ready — review it →', () => { count(); go(2, 1); });
    }, 2900, (L) => L.act && L.act());
  };

  /* -------- 2: owner review -------- */
  STAGES[2] = function (p) {
    p.innerHTML = `
      <span class="who-chip">${DANA} Dana · Domain Owner</span>
      <p class="eyebrow">Step 3 · back to the human</p>
      <h1 class="pagehead">Dana reviews, approves the people, signs one mandate</h1>
      <p class="lede">The chamber delivered a draft. Only a human can turn a draft into a plan.</p>
      <div class="card"><span class="ai-pill">confidence 75 · capped</span>
        <p><b>Top risk:</b> rollback readiness — an un-owned Excel checklist.<br><b>3 assumptions</b> marked (incl. "CAB reviews 100%", downgraded).<br><b>28 questions</b> drafted for 6 witnesses.</p></div>
      <div class="card" style="padding:6px 8px" id="stlist"></div>
      <div class="card"><h4>The interview mandate</h4><p>"The AI may schedule and conduct discovery interviews with the approved stakeholders. It may not confirm truth, approve anything, or touch any external system. Dana may revoke this at any time."</p></div>`;
    const stlist = document.getElementById('stlist');
    const checked = HUMANS.map(() => true);
    function renderList() {
      stlist.innerHTML = HUMANS.map((h, i) => `
        <div class="strow"><span>${h.svg}</span><span><b>${h.n}</b><br><small>${h.r}</small></span>
          <button class="toggle ${checked[i] ? 'on' : ''}" data-i="${i}">✓</button></div>`).join('');
      stlist.querySelectorAll('.toggle').forEach((btn) => {
        btn.onclick = () => { count(); const i = +btn.dataset.i; checked[i] = !checked[i]; renderList(); updateCta(); };
      });
    }
    function updateCta() {
      const n = checked.filter(Boolean).length;
      ctaReady(`Approve ${n} & sign the mandate ✍`, () => { count(); go(3, 1); });
    }
    renderList(); updateCta();
  };

  /* -------- 3: meetings -------- */
  STAGES[3] = function (p) {
    p.innerHTML = `
      <span class="who-chip" id="who">${HUMANS[5].svg} Mariam · Checklist Keeper (in session)</span>
      <p class="eyebrow">Step 4 · the meetings</p>
      <h1 class="pagehead">The AI runs the interviews — one conversation at a time</h1>
      <p class="lede">The Questioning Agent asks and adapts; Answer Intelligence scores every reply before it counts.</p>
      <div class="chat"><div class="chat-head">${INTERVIEWER} <span id="chat-with">Mariam · Checklist Keeper</span><span class="live"><i></i>LIVE</span></div>
        <div class="msgs" id="msgs"></div></div>
      <div class="ticker" id="ticker">0 / 6 witnesses interviewed</div>
      <div class="chiprow" id="raised"></div>`;
    setCTA('In session…', false);
    const who = document.getElementById('who');
    const msgs = document.getElementById('msgs');
    const raised = document.getElementById('raised');
    const ticker = document.getElementById('ticker');
    const chip = (label, cls) => raised.insertAdjacentHTML('beforeend', `<span class="spill ${cls}">${label}</span>`);
    let done = 0;
    const bump = () => { done++; ticker.textContent = `${Math.min(done, 6)} / 6 witnesses interviewed`; };

    const SCRIPT = [
      () => addMsg(msgs, 'left', 'Questioning Agent', '#0e7490', INTERVIEWER, 'Mariam, who currently owns the rollback checklist used during a failed change?'),
      () => addMsg(msgs, 'right', 'Mariam', null, HUMANS[5].svg, 'Honestly? Nobody owns it. I update the spreadsheet when I remember. BMC has an older copy from 2024.'),
      () => addMsg(msgs, 'left', 'Answer Intelligence', '#6d28d9', ANSWER_AI, 'Scored: completeness 41%, confidence LOW. Two candidates raised.'),
      () => { addSys(msgs, 'warn', 'GAP-07 opened · no formal checklist owner · severity HIGH'); chip('GAP-07 · ownership', 'warn'); bump(); },
      () => { addSys(msgs, '', 'Evidence request EV-11 sent to Yusuf'); chip('EV-11 · BMC version', 'grey');
        who.innerHTML = `${HUMANS[2].svg} Omar · Service Owner (in session)`; document.getElementById('chat-with').textContent = 'Omar & Layla · Service Owners'; },
      () => addMsg(msgs, 'left', 'Questioning Agent', '#0e7490', INTERVIEWER, 'Omar — what is the rollback SLA for a failed billing change?'),
      () => { addMsg(msgs, 'right', 'Omar', null, HUMANS[2].svg, 'Four hours. Always has been.'); bump(); },
      () => { addMsg(msgs, 'right', 'Layla', null, HUMANS[3].svg, 'It’s six hours. Four was the old agreement.'); who.innerHTML = `${HUMANS[3].svg} Layla · Service Owner (in session)`; bump(); },
      () => { addSys(msgs, 'bad', 'CONFLICT-03 · two owners disagree on the same SLA'); chip('CONFLICT-03 · SLA', 'bad'); },
      () => { addMsg(msgs, 'left', 'Questioning Agent', '#0e7490', INTERVIEWER, 'Recorded as an open conflict, not silently averaged. Khalid, Fatima and Yusuf are booked next.'); bump(); bump(); bump(); },
      () => addSys(msgs, '', 'Discovery closed · 28/28 questions · every answer traced to its witness'),
    ];
    let t = 500;
    SCRIPT.forEach((fn) => { later(fn, t); t += 2200; });
    later(() => ctaReady('2 findings need humans — Governance →', () => { count(); go(4, 1); }), t + 200);
  };

        <span class="gate"><span class="gi" style="background:var(--good)">✓</span>Source traced</span>
        <span class="gate"><span class="gi" style="background:var(--bad)">✕</span>Conflicts: 1 open</span>

  /* -------- 5: admin & audit -------- */

    later(() => ctaReady('Collect the deliverables →', () => { count(); go(6, 1); }), 550 * LOGS.length + 500);
  };

  /* -------- 6: deliverables -------- */
  STAGES[6] = function (p) {
    const FILES = [
      { icon: '📄', kind: 'text/markdown', name: 'pre-study/change-management-study.md',
        body: '# Pre-Study — Change Management\n\nStatus: DRAFT · confidence 75 (capped)\nProduced by: the 13-agent debate chamber, mandate DM-0417\n\nTop risk: rollback readiness — an Excel checklist with no owner.\n\n3 assumptions clearly marked, incl. "CAB reviews 100%" — challenged\nby the Verifier and downgraded (single source, no exhibit).\n\n14 sources cited across 9 claims.' },
      { icon: '🗺', kind: 'application/json', name: 'discovery/stakeholder-map.json',
        body: '{\n  "stakeholders": 6,\n  "priority_witness": "Mariam",\n  "coverage": ["CAB","NOC","Billing","Network","BMC"]\n}' },
      { icon: '🎙', kind: 'text/markdown', name: 'discovery/interview-pack.md',
        body: '28 questions · 6 witnesses\nEvery answer scored + linked.\nGAP-07 and CONFLICT-03 traced to source transcripts.' },

      { icon: '🧬', kind: 'application/json', name: 'genome/requirements.json',

      { icon: '🛡', kind: 'text/yaml', name: 'token-capital/no-prod-writeback.policy.yaml',
        body: 'policy: production_writeback\nrule: DENY ALWAYS\nscope: [BMC, CMDB, change-records]' },
      { icon: '🧪', kind: 'application/json', name: 'token-capital/rollback-0200.eval.json',
        body: '{\n  "scenario": "02:00 emergency change",\n  "based_on": "the real Ramadan-window incident"\n}' },
      { icon: '📦', kind: 'text/plain', name: 'governance/evidence-pack.pdf',
        body: 'READINESS: NOT READY (honest)\n1 conflict + 1 high gap open\nSign-off: Khalid ✓ · Yusuf … · Dana …' },

        body: '1,204 events · 0 gaps in the trail\nincl. 1 DENIED write attempt (BMC)\nevery entry carries a trace id' },
    ];

      <span class="who-chip">${DANA} Dana · Domain Owner</span>
      <p class="eyebrow">Step 7 · the deliverables</p>
      <h1 class="pagehead">Eleven files. Every one a DRAFT.</h1>

      <div class="flist" id="flist">${FILES.map((f, i) => `
        <button class="fitem" data-i="${i}"><span class="fic">${f.icon}</span><span class="fnm">${f.name}</span><span class="fdot" id="fdot${i}"></span><span class="chev2">›</span></button>`).join('')}</div>
      <div class="filestat">
        <div class="fs"><b>11</b><span>Files</span></div><div class="fs"><b>13</b><span>Agents</span></div>
        <div class="fs"><b>4</b><span>Humans</span></div><div class="fs"><b>0</b><span>Self-approved</span></div>
      </div>`;
    document.querySelectorAll('#flist .fitem').forEach((el) => {
      el.onclick = () => { count(); const i = +el.dataset.i; el.classList.add('seen'); openSheet(FILES[i]); };
    });
    ctaReady('Close the journey 🎉', () => { count(); showFinal(); }, true);
  };

  function showFinal() {
    cleanup(); closeSheet();
    const panel = document.createElement('div');
    panel.className = 'panel slide-in-r';
    track.innerHTML = ''; track.appendChild(panel);
    panel.innerHTML = `
      <div class="final">
        <h1>One journey. Four humans. Thirteen agents. Zero self-approvals.</h1>
        <p>Dana chose and signed · the chamber investigated under the Loop Engineer's law · the stakeholders spoke · Noura demanded evidence · Salem logged everything — and the platform handed back <b>files, not opinions</b>.</p>
        <div class="botgrid">${AGENTS.map((a) => `<span class="fbot">${a.svg}<span class="fname">${a.n}</span></span>`).join('')}</div>

      </div>`;
    stagelabel.textContent = '✓';
    dotsEl.querySelectorAll('.dot').forEach((d) => d.classList.add('done'));
    setCTA('⟲ Watch it again', true, () => { clicks = 0; go(0, -1); }, true);
  }

  drawDots();
  go(0, 1);
})();
</script>
